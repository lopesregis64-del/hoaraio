services:
  # BACKEND - FastAPI (Note: Currently named horario-frontend in Render)
  - type: web
    name: horario-frontend
    env: python
    region: ohio
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: CORS_ORIGINS
        value: "https://onehorario-frontend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: horario-db
          property: connectionString

  # FRONTEND - React (Vite) (Note: Currently named onehorario-frontend in Render)
  - type: web
    name: onehorario-frontend
    env: static
    region: ohio
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: VITE_API_URL
        value: "https://horario-frontend.onrender.com"

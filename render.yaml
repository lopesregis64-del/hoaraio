services:
  # BACKEND - FastAPI
  - type: web
    name: horario-backend
    env: python
    region: ohio
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: CORS_ORIGINS
        value: "https://onehorario-frontend.onrender.com" # Atualizado para a URL real
      - key: DATABASE_URL # Garantindo que DATABASE_URL esteja aqui se necessário, mas mantendo o foco no CORS
        fromDatabase:
          name: horario-db
          property: connectionString

  # FRONTEND - React (Vite)
  - type: web
    name: horario-frontend
    env: static
    region: ohio
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: VITE_API_URL
        value: "https://horario-backend.onrender.com" # Verifique se esta URL é a do seu backend no Render
